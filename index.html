<!DOCTYPE html>
<html>
<head>
    <title>Tab Switch Detector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Interview Portal </h1>
        <p>Stay on this page during the interview.</p>
        <button id="startTest">Start Test</button>   
        <h2>Dashboard</h2>
        <p><strong>Status:</strong> <span id="status">Not Started</span></p>
        <p><strong>Warnings:</strong> <span id="warningCount">0</span></p>
        <p><strong>Fullscreen Exits:</strong> <span id="fullscreenCount">0</span></p>
        <p><strong>Tab Switches:</strong> <span id="tabCount">0</span></p>
        <p><strong>Time Left:</strong> <span id="timer">01:00:00</span></p>
        <h3>Logs:</h3>
        <div id="logs"></div>
    </div>
<script src="script.js"></script>
</body>
</html>
